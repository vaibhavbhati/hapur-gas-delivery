openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Gas Delivery Management Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: deliveries
    description: Gas delivery records
  - name: settings
    description: Portal settings
  - name: storage
    description: File upload and serving
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deliveries:
    get:
      operationId: getDeliveries
      tags: [deliveries]
      summary: Get all delivery records
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by consumer number, name, or mobile
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of delivery records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryListResponse"
    post:
      operationId: createDelivery
      tags: [deliveries]
      summary: Create a delivery record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeliveryRequest"
      responses:
        "201":
          description: Delivery record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deliveries/{id}:
    get:
      operationId: getDelivery
      tags: [deliveries]
      summary: Get a delivery record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateDelivery
      tags: [deliveries]
      summary: Update a delivery record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeliveryRequest"
      responses:
        "200":
          description: Updated delivery record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
    delete:
      operationId: deleteDelivery
      tags: [deliveries]
      summary: Delete a delivery record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /deliveries/export/excel:
    get:
      operationId: exportDeliveries
      tags: [deliveries]
      summary: Export all deliveries as Excel
      responses:
        "200":
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /storage/objects/{objectPath}:
    get:
      tags: [storage]
      operationId: getStorageObject
      summary: Serve an uploaded file
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            "*/*":
              schema:
                type: string
                format: binary

  /deliveries/{id}/files:
    get:
      operationId: getDeliveryFiles
      tags: [deliveries]
      summary: Get files attached to a delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryFileRecord"
    post:
      operationId: attachDeliveryFile
      tags: [deliveries]
      summary: Attach an uploaded file to a delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachFileRequest"
      responses:
        "201":
          description: File attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryFileRecord"

  /deliveries/{id}/files/{fileId}:
    delete:
      operationId: deleteDeliveryFile
      tags: [deliveries]
      summary: Remove a file from a delivery
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: fileId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users:
    get:
      operationId: getUsers
      tags: [auth]
      summary: Get all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}/password:
    put:
      operationId: updateUserPassword
      tags: [auth]
      summary: Update a user's password (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePasswordRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get portal settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update portal settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    LoginResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string
      required:
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, user]
        name:
          type: string
      required:
        - id
        - username
        - role
        - name

    Delivery:
      type: object
      properties:
        id:
          type: integer
        consumerNumber:
          type: string
        customerName:
          type: string
        mobileNumber:
          type: string
        deliveryDate:
          type: string
          format: date
        nextEligibleDate:
          type: string
          format: date
        createdBy:
          type: integer
        createdByName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - consumerNumber
        - customerName
        - mobileNumber
        - deliveryDate
        - nextEligibleDate
        - createdBy
        - createdAt
        - updatedAt

    CreateDeliveryRequest:
      type: object
      properties:
        consumerNumber:
          type: string
        customerName:
          type: string
        deliveryDate:
          type: string
          format: date
      required:
        - consumerNumber
        - customerName
        - deliveryDate

    UpdateDeliveryRequest:
      type: object
      properties:
        consumerNumber:
          type: string
        customerName:
          type: string
        mobileNumber:
          type: string
        deliveryDate:
          type: string
          format: date

    DeliveryListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Delivery"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - data
        - total
        - page
        - limit

    Settings:
      type: object
      properties:
        waitingDays:
          type: integer
          description: Number of days a customer must wait before next gas delivery
        updatedAt:
          type: string
          format: date-time
      required:
        - waitingDays

    UpdateSettingsRequest:
      type: object
      properties:
        waitingDays:
          type: integer
          minimum: 1
      required:
        - waitingDays

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    DeliveryFileRecord:
      type: object
      properties:
        id:
          type: integer
        deliveryId:
          type: integer
        fileName:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
        objectPath:
          type: string
        uploadedBy:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - deliveryId
        - fileName
        - fileType
        - fileSize
        - objectPath
        - uploadedBy
        - createdAt

    AttachFileRequest:
      type: object
      properties:
        fileName:
          type: string
        fileType:
          type: string
        fileSize:
          type: integer
        objectPath:
          type: string
      required:
        - fileName
        - fileType
        - fileSize
        - objectPath

    UpdatePasswordRequest:
      type: object
      properties:
        password:
          type: string
          minLength: 4
      required:
        - password
